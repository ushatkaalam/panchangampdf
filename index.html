<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Categories of documentation</title>

<script src="docs.js" defer></script>

<style>

body
{
    font-family:Arial,Helvetica,sans-serif;
    margin:20px;
}

h1
{
    text-align:center;
}

button
{
    width:180px;
    padding:12px;
    font-size:16px;
    margin-bottom:20px;
}


#categoryButtons
{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:25px;
}

.category
{
    min-width:160px;
}

.active
{
    background:#1976d2;
    color:white;
    font-weight:bold;
}

#pdfButtonContainer
{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:20px;
}
.pdfSelected
{
    background:#90caf9;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>Documentation</h1>

<div id="categoryButtons">

    <button
        id="btnCategoryA"
        class="category active">
        Category A
    </button>

    <button
        id="btnCategoryB"
        class="category">
        Category B
    </button>
<button
        id="btnCategoryC"
        class="category">
        Category C
    </button>
<button
        id="btnCategoryD"
        class="category">
        Category D
    </button>

</div>

<div id="pdfButtonContainer">

</div>


</body>

</html>
